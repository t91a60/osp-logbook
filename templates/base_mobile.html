<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="OSP Logbook" />
    <meta name="csrf-token" content="{{ csrf_token() }}" />
    <link
      rel="manifest"
      href="{{ url_for('static', filename='manifest.json') }}"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%231a1a1a' width='192' height='192'/><text x='96' y='120' font-size='120' text-anchor='middle' fill='%23ff6b3d' font-weight='bold'>🔥</text></svg>"
    />
    <title>{% block title %}OSP Logbook{% endblock %}</title>

    <link rel="stylesheet" href="{{ asset_url('mobile.css') }}" />
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker
            .register("/sw.js")
            .catch((err) => console.log("SW register failed: ", err));
        });
      }
    </script>
  </head>
  <body>
    <header class="topbar">
      <a href="{{ url_for('main.dashboard') }}" class="topbar-brand"
        >OSP Logbook</a
      >
      {% if session.user_id %}
      <div class="topbar-user">
        <span>{{ session.display_name }}</span>
        <a href="{{ url_for('auth.logout') }}" class="topbar-logout">Wyloguj</a>
      </div>
      {% endif %}
    </header>

    <div
      class="toast-container"
      id="toastContainer"
      role="status"
      aria-live="polite"
    ></div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    <script id="flashMessages" type="application/json">
      {{ messages|tojson }}
    </script>
    {% endwith %}

    <main class="container page">{% block content %}{% endblock %}</main>

    {% if session.user_id %}
    <nav class="bottom-nav">
      <a
        href="{{ url_for('main.dashboard') }}"
        class="nav-link {% if request.endpoint == 'main.dashboard' %}active{% endif %}"
      >
        <span class="nav-icon">⌂</span><span>Start</span>
      </a>
      <a
        href="{{ url_for('trips.trips') }}"
        class="nav-link {% if request.endpoint == 'trips.trips' %}active{% endif %}"
      >
        <span class="nav-icon">🚒</span><span>Wyjazdy</span>
      </a>
      <a
        href="{{ url_for('fuel.fuel') }}"
        class="nav-link {% if request.endpoint == 'fuel.fuel' %}active{% endif %}"
      >
        <span class="nav-icon">⛽</span><span>Paliwo</span>
      </a>
      <a
        href="{{ url_for('maintenance.maintenance') }}"
        class="nav-link {% if request.endpoint == 'maintenance.maintenance' %}active{% endif %}"
      >
        <span class="nav-icon">🔧</span><span>Serwis</span>
      </a>
      <a
        href="{{ url_for('admin.vehicles') }}"
        class="nav-link {% if request.endpoint in ('admin.vehicles', 'admin.users', 'report.report', 'logs.logs_list') %}active{% endif %}"
      >
        <span class="nav-icon">☰</span><span>Więcej</span>
      </a>
    </nav>
    {% endif %}

    <script src="{{ asset_url('app.js') }}"></script>
  </body>
</html>
