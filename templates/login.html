<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OSP Logbook">
<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<title>Logowanie – OSP Logbook</title>
<script nonce="{{ csp_nonce() }}">
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/sw.js').then(function(registration) {
        console.log('ServiceWorker registration successful');
      }, function(err) {
        console.log('ServiceWorker registration failed: ', err);
      });
    });
  }
</script>
<link rel="stylesheet" href="{{ asset_url('login.css') }}">
</head>
<body>

<div class="login-container">
  <div class="brand">
    <div class="brand-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 2C8 6 4 9.5 4 14a8 8 0 0016 0c0-4.5-4-8-8-12z" fill="#ff6b3d"/>
        <path d="M12 8c-2 2.5-3 4.5-3 6a3 3 0 006 0c0-1.5-1-3.5-3-6z" fill="#fff" opacity=".6"/>
      </svg>
    </div>
    <h1 class="brand-title">OSP Logbook</h1>
    <div class="brand-subtitle">Dziennik Pojazdów</div>
  </div>

  <form method="POST" action="{{ url_for('login') }}" class="login-form">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="error-message">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            {{ msg }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="form-field">
      <label class="form-label" for="username">Zaloguj się</label>
      <input type="text" id="username" name="username" class="form-input"
             placeholder="Login" 
             autocomplete="username" 
             autocapitalize="none"
             required autofocus>
    </div>

    <div class="form-field">
      <input type="password" id="password" name="password" class="form-input"
             placeholder="Hasło" 
             autocomplete="current-password"
             required>
    </div>

    <button type="submit" class="btn-primary">
      Dalej
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </form>
</div>

</body>
</html>
