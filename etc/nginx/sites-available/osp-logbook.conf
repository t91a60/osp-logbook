limit_req_zone $binary_remote_addr zone=app:10m rate=20r/s;

server {
    listen 80;
    server_name osp.twoja-domena.pl;

    client_max_body_size 2M;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    limit_req zone=app burst=40 nodelay;
    limit_req_status 429;

    location /static/ {
        alias /opt/osp-logbook/osp_logbook/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://unix:/run/osp-logbook/gunicorn.sock;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}
