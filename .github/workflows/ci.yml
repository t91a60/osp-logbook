name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: osp_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]

    env:
      FLASK_ENV: testing
      SECRET_KEY: test-secret-key-for-ci
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/osp_test
      RATELIMIT_STORAGE_URI: redis://127.0.0.1:6379/0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check backend tests app.py run.py
        continue-on-error: true

      - name: Apply schema
        env:
          PGHOST: 127.0.0.1
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: osp_test
        run: |
          psql "$DATABASE_URL" -f schema.sql || true

      - name: Run tests
        run: pytest tests/ --no-header -q

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build .
