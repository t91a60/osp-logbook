services:
  - type: web
    name: osp-logbook
    env: docker
    region: frankfurt
    plan: free
    # Render przekazuje PORT do kontenera; Gunicorn binduje się do tego portu.
    preDeployCommand: python -m yoyo apply -b --database $DATABASE_URL ./migrations
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: osp-logbook-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: RATELIMIT_STORAGE_URI
        value: memory://

databases:
  - name: osp-logbook-db
    databaseName: osp_logbook
    user: logbook_user
    plan: free
