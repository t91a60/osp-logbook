services:
  - type: web
    name: osp-logbook
    env: docker
    region: frankfurt
    plan: free
    # Render przekazuje PORT do kontenera; Gunicorn binduje się do tego portu.
    # Schema jest bootstrapowana z schema.sql, bo migracja Yoyo jest tylko
    # no-op baseline i nie tworzy tabel wymaganych przez aplikację.
    preDeployCommand: python scripts/apply_schema.py
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: osp-logbook-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: RATELIMIT_STORAGE_URI
        value: memory://
      - key: GUNICORN_WORKERS
        value: "2"
      - key: GUNICORN_THREADS
        value: "2"
      - key: GUNICORN_TIMEOUT
        value: "60"
      - key: DB_POOL_MIN
        value: "1"
      - key: DB_POOL_MAX
        value: "10"

databases:
  - name: osp-logbook-db
    databaseName: osp_logbook
    user: logbook_user
    plan: free
